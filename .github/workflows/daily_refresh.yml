name: Daily Data Refresh

on:
  schedule:
    - cron: '0 17 * * *' # 10:30 PM IST (5:30 PM UTC)
  workflow_dispatch: # Allow manual trigger

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Data Injectors
        run: |
          python phase1_data_collection/regulatory_knowledge_injector.py
          python phase1_data_collection/sbi_official_scraped_injector.py
          python phase1_data_collection/indmoney_knowledge_injector.py
          python phase1_data_collection/quantitative_data_injector.py
          python phase1_data_collection/structured_data_injector.py

      - name: Run Embedder (Build FAISS Index)
        run: |
          python phase3_embeddings/embedder.py

      - name: Update Last Refresh Timestamp
        run: |
          python -c "import json; from datetime import datetime; data = {'last_refresh': datetime.now().strftime('%d %b %Y, %I:%M %p')}; open('data/last_update.json', 'w').write(json.dumps(data))"

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/ vector_store/
          git commit -m "Automated daily data refresh [skip ci]" || echo "No changes to commit"
          git push
